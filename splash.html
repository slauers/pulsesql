<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlackTable Splash</title>
    <style>
      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background:
          radial-gradient(circle at top center, rgba(34, 199, 255, 0.12), transparent 34%),
          linear-gradient(180deg, #08101c 0%, #050913 52%, #04070f 100%);
      }

      #root {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
      }

      #root:empty::before {
        content: "";
        width: 286px;
        height: 206px;
        max-width: calc(100vw - 20px);
        border: 1px solid rgba(126, 152, 184, 0.22);
        border-radius: 24px;
        background: rgba(8, 16, 28, 0.96);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.04),
          0 20px 64px rgba(0, 0, 0, 0.34),
          0 0 44px rgba(34, 199, 255, 0.14),
          0 0 88px rgba(34, 199, 255, 0.06);
      }
    </style>
    <script type="module" src="/src/splash.tsx"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
